# ============================================================================
# TMUX Configuration - Karnadi's Setup (Simplified to fix E[1 q bug)
# ============================================================================

# --- General ------------------------------------------------------------------
set -g default-terminal "tmux-256color"

# Use modern terminal-features for Ghostty and standard xterm (Ubuntu Terminal)
# This replaces the old Ss/Se overrides which often lead to escape-stripping issues.
set -as terminal-features ",xterm*:cstyle:256:rgb:focus"
set -as terminal-features ",ghostty:cstyle:256:rgb:focus"

# Force true color support
set -as terminal-overrides ",xterm*:Tc"
set -as terminal-overrides ",ghostty:Tc"

set -g allow-passthrough on
set -g mouse on
set -g focus-events off  # Disable focus events to stop E[1 q emission on focus change
set -s escape-time 0
set -g history-limit 50000

# Reload with Prefix + r
unbind r
bind r source-file ~/.tmux.conf \; display "¾░æō Config reloaded!"

# --- Appearance & Colors (Andromeda) -----------------------------------------
BG="#23262E"
FG="#D5CED9"
BLACK="#1b1e24"
ACCENT="#00e8c6"
PURPLE="#c74ded"
BLUE="#7cb7ff"
ORANGE="#f39c12"
YELLOW="#FFE66D"
HOT_PINK="#f92672"
RED="#ee5d43"
GREEN="#96E072"
PANEL="#2b303b"
BORDER="#363c49"

# Status bar position & style
set -g status-position bottom
set -g status-justify left
set -g status-interval 3
set -g status-style "bg=default,fg=${FG}"

# Separators
L_CAP="ŅéČ"
R_CAP="Ņé┤"

# [Left] Session Name
set -g status-left-length 60
set -g status-left "#[fg=${ACCENT}]${L_CAP}#[bg=${ACCENT}]#[fg=${BLACK}]#[bold] ¾░¢▓ #S #[bg=default]#[fg=${ACCENT}]${R_CAP}  "

# [Center/Windows]
set -g window-status-separator " "
set -g window-status-format "#[fg=${PANEL}]${L_CAP}#[bg=${PANEL}]#[fg=${FG}] ¾░¢» #I:#W #[bg=default]#[fg=${PANEL}]${R_CAP}"
set -g window-status-current-format "#[fg=${ACCENT}]${L_CAP}#[bg=${ACCENT}]#[fg=${BLACK}]#[bold] ¾░¢░ #I:#W #[bg=default]#[fg=${ACCENT}]${R_CAP}"

# [Right] Info modules
set -g @prefix_pill "#[fg=${YELLOW}]${L_CAP}#[bg=${YELLOW}]#[fg=${BLACK}]#[bold] ¾░īÆ ^B #[bg=default]#[fg=${YELLOW}]${R_CAP} "
set -g @copy_pill "#[fg=${ORANGE}]${L_CAP}#[bg=${ORANGE}]#[fg=${BLACK}]#[bold] ¾░åÅ COPY #[bg=default]#[fg=${ORANGE}]${R_CAP} "

set -g status-right-length 300
set -g status-right "#{?client_prefix,#{@prefix_pill},}#{?pane_in_mode,#{@copy_pill},}#(bash -c 'if git -C #{pane_current_path} rev-parse --is-inside-work-tree >/dev/null 2>&1; then branch=$(~/.local/bin/tmux-git-branch \"#{pane_current_path}\"); echo \"#[fg=${PURPLE}]${L_CAP}#[bg=${PURPLE}]#[fg=${BLACK}] Ņ£ź \$branch #[bg=default]#[fg=${PURPLE}]${R_CAP} \"; fi')#[fg=${BLUE}]${L_CAP}#[bg=${BLUE}]#[fg=${BLACK}] ¾░źö %H:%M #[bg=default]#[fg=${BLUE}]${R_CAP} #[fg=${HOT_PINK}]${L_CAP}#[bg=${HOT_PINK}]#[fg=${BLACK}] ¾░āŁ %d-%b #[bg=default]#[fg=${HOT_PINK}]${R_CAP} #[fg=${GREEN}]${L_CAP}#[bg=${GREEN}]#[fg=${BLACK}] ¾░¤Ć #h #[bg=default]#[fg=${GREEN}]${R_CAP}"

# --- Panes & Borders ---------------------------------------------------------
set -g pane-border-style "fg=${BORDER}"
set -g pane-active-border-style "fg=${ACCENT},bold"
set -g pane-border-lines single
set -g display-panes-colour "${ACCENT}"
set -g display-panes-active-colour "${GREEN}"

# Background separation: Inactive vs Active
setw -g window-style "bg=${PANEL}"
setw -g window-active-style "bg=${BG}"

# --- Navigation -------------------------------------------------------------
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R
bind-key -n M-right next-window
bind-key -n M-left previous-window
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Behavior ---------------------------------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g monitor-activity on
set -g visual-activity off
set -g allow-rename off

# Copy mode (vi keys)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"

# --- TPM & Plugins ---------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sidebar'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

run '~/.tmux/plugins/tpm/tpm'
